<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trains</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; padding: 1em; max-width: 640px; margin: 0 auto; line-height: 1.4; }
    h1 { font-size: 1.3em; margin: 0 0 0.5em; }
    .group { margin-top: 1.5em; padding-top: 0.5em; border-top: 2px solid #333; }
    .group-title { font-weight: bold; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.85em; color: #333; }
    h2 { font-size: 1em; margin: 1em 0 0.3em; border-bottom: 1px solid #ddd; padding-bottom: 0.2em; }
    h2.chain-title { color: #036; border-bottom-color: #036; }
    .train { display: flex; justify-content: space-between; padding: 0.5em 0.4em; border-bottom: 1px solid #eee; align-items: baseline; gap: 0.6em; }
    .train:last-child { border-bottom: none; }
    .train .mins { font-size: 1.3em; font-weight: bold; white-space: nowrap; }
    .train .mins.now, .chain .mins.now { color: #c00; }
    .train .mins.soon, .chain .mins.soon { color: #e80; }
    .train .meta { color: #666; font-size: 0.85em; text-align: right; }
    .train .times { color: #222; font-weight: 500; }
    .chain { display: flex; gap: 0.7em; padding: 0.7em 0.5em; border-bottom: 1px solid #ddf; align-items: flex-start; background: #f4f8ff; }
    .chain:last-child { border-bottom: none; }
    .chain .mins { font-size: 1.3em; font-weight: bold; min-width: 4.5em; }
    .chain-detail { flex: 1; font-size: 0.9em; }
    .chain-detail .main { font-weight: 500; }
    .chain-detail .sub { color: #555; font-size: 0.88em; margin-top: 0.1em; }
    .err { color: #b00; white-space: pre-wrap; font-family: monospace; font-size: 0.8em; background: #fee; padding: 0.5em; border-radius: 4px; }
    button { padding: 0.6em 1.4em; font-size: 1em; }
    .muted { color: #888; font-size: 0.85em; }
    .empty { color: #888; font-style: italic; padding: 0.5em 0.4em; }
  </style>
</head>
<body>
  <h1>Trains</h1>
  <p><button onclick="run()">Refresh</button> <span class="muted" id="time"></span></p>
  <div id="out"><p class="muted">Loading…</p></div>
  <script>
    const KEY = '__AT_API_KEY__';
    const BASE = 'https://api.at.govt.nz/gtfs/v3';

    const WEST = ['new lynn', 'henderson', 'swanson', 'ranui', 'sturges', 'fruitvale', 'glen eden', 'sunnyvale'];
    const CITY = ['brit', 'waitemat'];
    const EAST = ['manukau', 'panmure', 'glen innes', 'meadowbank', 'sylvia', 'otahuhu'];

    const TRANSFER_BUFFER = 3;

    const LEGS = {
      newmarket_avondale: { title: 'Newmarket → Avondale', stop_ids: ['115-96c3c7be'], wantDest: WEST, transit: 13, arriveLabel: 'Avondale' },
      orakei_waitemata:   { title: 'Orakei → Waitematā',   stop_ids: ['116-214837ca'], wantDest: CITY, transit: 10, arriveLabel: 'Waitematā' },
      waitemata_avondale: { title: 'Waitematā → Avondale (leg 2)', stop_ids: ['133-08da14b5'], wantDest: WEST, transit: 22, arriveLabel: 'Avondale' },
      avondale_newmarket: { title: 'Avondale → Newmarket', stop_ids: ['105-474861ff'], wantDest: CITY, transit: 13, arriveLabel: 'Newmarket' },
      waitemata_orakei:   { title: 'Waitematā → Orakei (leg 2)', stop_ids: ['133-08da14b5'], wantDest: EAST, transit: 10, arriveLabel: 'Orakei' }
    };

    const GROUPS = [
      {
        label: 'To work',
        legs: ['newmarket_avondale', 'orakei_waitemata', 'waitemata_avondale'],
        chain: { title: 'Orakei route — matched chain', leg1: 'orakei_waitemata', leg2: 'waitemata_avondale' }
      },
      {
        label: 'To home',
        legs: ['avondale_newmarket', 'waitemata_orakei'],
        chain: { title: 'Orakei route — matched chain', leg1: 'avondale_newmarket', leg2: 'waitemata_orakei', leg1Transit: 22 }  // override: this chain uses Avondale→Waitematā transit (22), not Avondale→Newmarket (13)
      }
    ];

    async function api(path) {
      try {
        const r = await fetch(BASE + path, { headers: { 'Ocp-Apim-Subscription-Key': KEY } });
        const text = await r.text();
        let body;
        try { body = JSON.parse(text); } catch { body = text; }
        return { ok: r.ok, status: r.status, body };
      } catch (e) {
        return { ok: false, status: 0, body: 'Network error: ' + e.message };
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }

    function nzDateParts() {
      const fmt = new Intl.DateTimeFormat('en-NZ', {
        timeZone: 'Pacific/Auckland',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false
      });
      const parts = {};
      for (const p of fmt.formatToParts(new Date())) if (p.type !== 'literal') parts[p.type] = p.value;
      return parts;
    }

    function parseTime(s) {
      if (!s) return null;
      const m = String(s).match(/^(\d{1,2}):(\d{2}):(\d{2})/);
      if (!m) return null;
      return (+m[1]) * 3600 + (+m[2]) * 60 + (+m[3]);
    }

    function secToHHMM(sec) {
      sec = ((sec % 86400) + 86400) % 86400;
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    function getDestination(headsign) {
      const h = (headsign || '').toLowerCase();
      const idx = h.indexOf(' to ');
      return idx >= 0 ? h.substring(idx + 4) : h;
    }

    function matchesDirection(headsign, wantPatterns) {
      const dest = getDestination(headsign);
      return wantPatterns.some(p => dest.startsWith(p));
    }

    function cleanHeadsign(headsign) {
      return (headsign || '')
        .replace(/\s\d+\b/g, '')
        .replace(/\bTo\b/g, '→')
        .replace(/\bVia\b/g, 'via')
        .trim();
    }

    async function fetchTrips(stop_id) {
      const p = nzDateParts();
      const date = `${p.year}-${p.month}-${p.day}`;
      const hour = parseInt(p.hour, 10);
      const qs = `filter[date]=${date}&filter[start_hour]=${hour}&filter[hour_range]=2`;
      return api(`/stops/${encodeURIComponent(stop_id)}/stoptrips?${qs}`);
    }

    function extractDeparture(item) {
      const a = item.attributes || item;
      return {
        departure_time: a.departure_time || a.arrival_time || a.scheduled_departure_time,
        trip_headsign: a.trip_headsign || a.headsign || ''
      };
    }

    async function getLegTrips(leg, nowSec) {
      const trips = [];
      const errors = [];
      for (const sid of leg.stop_ids) {
        const res = await fetchTrips(sid);
        if (!res.ok) { errors.push(`stop ${sid}: HTTP ${res.status}`); continue; }
        for (const t of (res.body.data || [])) trips.push(extractDeparture(t));
      }
      let filtered = trips.filter(t => matchesDirection(t.trip_headsign, leg.wantDest));
      filtered = filtered.map(t => {
        const tsec = parseTime(t.departure_time);
        return { ...t, sec: tsec, mins: tsec == null ? null : Math.round((tsec - nowSec) / 60) };
      }).filter(t => t.sec != null && t.mins >= -1).sort((a,b) => a.sec - b.sec);
      return { trips: filtered, errors };
    }

    function renderLegSection(leg, data) {
      const html = [`<h2>${escapeHtml(leg.title)}</h2>`];
      if (data.errors.length) html.push(`<div class="err">${escapeHtml(data.errors.join('\n'))}</div>`);
      if (data.trips.length === 0 && !data.errors.length) {
        html.push(`<div class="empty">No upcoming trains</div>`);
      } else {
        for (const t of data.trips.slice(0, 3)) {
          const label = t.mins <= 0 ? 'now' : `${t.mins} min`;
          const cls = t.mins <= 1 ? 'now' : (t.mins <= 4 ? 'soon' : '');
          const depTime = (t.departure_time || '').slice(0, 5);
          const arrTime = secToHHMM(t.sec + leg.transit * 60);
          html.push(`<div class="train"><span class="mins ${cls}">${escapeHtml(label)}</span><span class="meta"><span class="times">${escapeHtml(depTime)} → ~${escapeHtml(arrTime)}</span><br>${escapeHtml(cleanHeadsign(t.trip_headsign))}</span></div>`);
        }
      }
      return html.join('');
    }

    function renderChainSection(chainCfg, leg1, leg2, leg1Data, leg2Data) {
      // For home chain, leg1 transit to Waitematā differs from leg1's own arriveLabel (Newmarket).
      const leg1Transit = chainCfg.leg1Transit != null ? chainCfg.leg1Transit : leg1.transit;
      const pairs = [];
      for (const t1 of leg1Data.trips) {
        const arriveSec = t1.sec + leg1Transit * 60;
        const earliestBoardSec = arriveSec + TRANSFER_BUFFER * 60;
        const match = leg2Data.trips.find(t2 => t2.sec >= earliestBoardSec);
        if (match) {
          const waitMins = Math.round((match.sec - arriveSec) / 60);
          const finalSec = match.sec + leg2.transit * 60;
          pairs.push({
            t1, t2: match,
            transferArriveTime: secToHHMM(arriveSec),
            finalArriveTime: secToHHMM(finalSec),
            finalLabel: leg2.arriveLabel,
            waitMins
          });
        }
        if (pairs.length >= 3) break;
      }
      const html = [`<h2 class="chain-title">${escapeHtml(chainCfg.title)}</h2>`];
      if (pairs.length === 0) {
        html.push(`<div class="empty">No matched chain in next 2 hours</div>`);
      } else {
        for (const p of pairs) {
          const label = p.t1.mins <= 0 ? 'now' : `${p.t1.mins} min`;
          const cls = p.t1.mins <= 1 ? 'now' : (p.t1.mins <= 4 ? 'soon' : '');
          html.push(`<div class="chain">
            <span class="mins ${cls}">${escapeHtml(label)}</span>
            <div class="chain-detail">
              <div class="main">Catch ${escapeHtml(p.t1.departure_time.slice(0,5))} → arrive Waitematā ~${escapeHtml(p.transferArriveTime)}</div>
              <div class="sub">Board ${escapeHtml(p.t2.departure_time.slice(0,5))} — ${p.waitMins} min transfer → arrive ${escapeHtml(p.finalLabel)} ~${escapeHtml(p.finalArriveTime)}</div>
            </div>
          </div>`);
        }
      }
      return html.join('');
    }

    async function run() {
      document.getElementById('time').textContent = 'Updated ' + new Date().toLocaleTimeString('en-NZ', { timeZone: 'Pacific/Auckland' });
      const out = document.getElementById('out');
      out.innerHTML = '<p class="muted">Loading…</p>';

      const p = nzDateParts();
      const nowSec = parseInt(p.hour, 10) * 3600 + parseInt(p.minute, 10) * 60;

      const legData = {};
      const uniqueLegs = new Set();
      for (const g of GROUPS) {
        for (const id of g.legs) uniqueLegs.add(id);
        if (g.chain) { uniqueLegs.add(g.chain.leg1); uniqueLegs.add(g.chain.leg2); }
      }
      for (const id of uniqueLegs) legData[id] = await getLegTrips(LEGS[id], nowSec);

      const parts = [];
      for (const g of GROUPS) {
        parts.push(`<div class="group"><div class="group-title">${escapeHtml(g.label)}</div>`);
        for (const id of g.legs) parts.push(renderLegSection(LEGS[id], legData[id]));
        if (g.chain) parts.push(renderChainSection(g.chain, LEGS[g.chain.leg1], LEGS[g.chain.leg2], legData[g.chain.leg1], legData[g.chain.leg2]));
        parts.push('</div>');
      }
      out.innerHTML = parts.join('');
    }

    run();
  </script>
</body>
</html>
