<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trains</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; padding: 1em; max-width: 640px; margin: 0 auto; line-height: 1.4; }
    h1 { font-size: 1.3em; margin: 0 0 0.5em; }
    h2 { font-size: 1.05em; margin: 1.3em 0 0.4em; border-bottom: 1px solid #ddd; padding-bottom: 0.2em; }
    .train { display: flex; justify-content: space-between; padding: 0.6em 0.4em; border-bottom: 1px solid #eee; align-items: baseline; }
    .train:last-child { border-bottom: none; }
    .train .mins { font-size: 1.4em; font-weight: bold; }
    .train .mins.now { color: #c00; }
    .train .mins.soon { color: #e80; }
    .train .meta { color: #666; font-size: 0.85em; text-align: right; }
    .err { color: #b00; white-space: pre-wrap; font-family: monospace; font-size: 0.8em; background: #fee; padding: 0.5em; border-radius: 4px; }
    .raw { font-family: monospace; font-size: 0.7em; white-space: pre-wrap; background: #f4f4f4; padding: 0.5em; overflow: auto; max-height: 300px; }
    button { padding: 0.6em 1.4em; font-size: 1em; }
    .muted { color: #888; font-size: 0.85em; }
    .empty { color: #888; font-style: italic; padding: 0.6em 0.4em; }
  </style>
</head>
<body>
  <h1>Trains</h1>
  <p><button onclick="run()">Refresh</button> <span class="muted" id="time"></span></p>
  <div id="out"><p class="muted">Loading…</p></div>
  <script>
    const KEY = '__AT_API_KEY__';
    const BASE = 'https://api.at.govt.nz/gtfs/v3';

    // Destination prefixes (matched after " To " in headsign)
    const ROUTES = [
      {
        title: 'Newmarket → Avondale (to work)',
        stop_ids: ['115-96c3c7be'],
        wantDest: ['new lynn', 'henderson', 'swanson', 'ranui', 'sturges', 'fruitvale', 'glen eden', 'sunnyvale']
      },
      {
        title: 'Avondale → Newmarket (home)',
        stop_ids: ['105-474861ff'],
        wantDest: ['brit', 'waitemat']
      }
    ];

    async function api(path) {
      try {
        const r = await fetch(BASE + path, {
          headers: { 'Ocp-Apim-Subscription-Key': KEY }
        });
        const text = await r.text();
        let body;
        try { body = JSON.parse(text); } catch { body = text; }
        return { ok: r.ok, status: r.status, body };
      } catch (e) {
        return { ok: false, status: 0, body: 'Network error: ' + e.message };
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }

    function nzDateParts() {
      const fmt = new Intl.DateTimeFormat('en-NZ', {
        timeZone: 'Pacific/Auckland',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false
      });
      const parts = {};
      for (const p of fmt.formatToParts(new Date())) {
        if (p.type !== 'literal') parts[p.type] = p.value;
      }
      return parts;
    }

    function parseTime(s) {
      if (!s) return null;
      const m = String(s).match(/^(\d{1,2}):(\d{2}):(\d{2})/);
      if (!m) return null;
      return (+m[1]) * 3600 + (+m[2]) * 60 + (+m[3]);
    }

    // Extract destination from "ORIGIN To DESTINATION Via WAYPOINT" headsigns.
    function getDestination(headsign) {
      const h = (headsign || '').toLowerCase();
      const idx = h.indexOf(' to ');
      return idx >= 0 ? h.substring(idx + 4) : h;
    }

    function matchesDirection(headsign, wantPatterns) {
      const dest = getDestination(headsign);
      return wantPatterns.some(p => dest.startsWith(p));
    }

    // Strip the platform numbers from the headsign for display (e.g. "Brit 2 To New Lynn 2 Via Newmarket 1" → "Brit → New Lynn via Newmarket")
    function cleanHeadsign(headsign) {
      return (headsign || '')
        .replace(/\s\d+\b/g, '')        // strip " 2", " 4", etc.
        .replace(/\bTo\b/g, '→')
        .replace(/\bBrit\b/gi, 'Brit')
        .replace(/\bVia\b/g, 'via')
        .trim();
    }

    async function fetchTrips(stop_id) {
      const p = nzDateParts();
      const date = `${p.year}-${p.month}-${p.day}`;
      const hour = parseInt(p.hour, 10);
      const qs = `filter[date]=${date}&filter[start_hour]=${hour}&filter[hour_range]=2`;
      return api(`/stops/${encodeURIComponent(stop_id)}/stoptrips?${qs}`);
    }

    function extractDeparture(item) {
      const a = item.attributes || item;
      return {
        departure_time: a.departure_time || a.arrival_time || a.scheduled_departure_time,
        trip_headsign: a.trip_headsign || a.headsign || '',
        route_short_name: a.route_short_name || ''
      };
    }

    async function renderRoute(route) {
      const p = nzDateParts();
      const nowSec = parseInt(p.hour, 10) * 3600 + parseInt(p.minute, 10) * 60;

      const allTrips = [];
      const errors = [];
      const raws = [];

      for (const sid of route.stop_ids) {
        const res = await fetchTrips(sid);
        if (!res.ok) {
          errors.push(`stop ${sid}: HTTP ${res.status}\n${JSON.stringify(res.body).slice(0, 800)}`);
          continue;
        }
        raws.push({ stop: sid, body: res.body });
        for (const t of (res.body.data || [])) allTrips.push(extractDeparture(t));
      }

      let filtered = allTrips.filter(t => matchesDirection(t.trip_headsign, route.wantDest));
      const showAll = filtered.length === 0 && allTrips.length > 0;
      if (showAll) filtered = allTrips;

      filtered = filtered.map(t => {
        const tsec = parseTime(t.departure_time);
        const mins = tsec == null ? null : Math.round((tsec - nowSec) / 60);
        return { ...t, mins };
      }).filter(t => t.mins != null && t.mins >= -1).sort((a,b) => a.mins - b.mins);

      const html = [`<h2>${escapeHtml(route.title)}</h2>`];
      if (errors.length) html.push(`<div class="err">${escapeHtml(errors.join('\n\n'))}</div>`);
      if (showAll && filtered.length) html.push(`<p class="muted">No trains matched direction filter — showing all trips:</p>`);
      if (filtered.length === 0 && !errors.length) {
        html.push(`<div class="empty">No upcoming trains in the next 2 hours</div>`);
      } else {
        for (const t of filtered.slice(0, 4)) {
          const label = t.mins <= 0 ? 'now' : `${t.mins} min`;
          const cls = t.mins <= 1 ? 'now' : (t.mins <= 4 ? 'soon' : '');
          const time = (t.departure_time || '').slice(0, 5);
          html.push(`<div class="train"><span class="mins ${cls}">${escapeHtml(label)}</span><span class="meta">${escapeHtml(time)}<br>${escapeHtml(cleanHeadsign(t.trip_headsign))}</span></div>`);
        }
      }
      html.push(`<details><summary class="muted">Debug</summary><div class="raw">${escapeHtml(JSON.stringify(raws, null, 2))}</div></details>`);
      return html.join('');
    }

    async function run() {
      document.getElementById('time').textContent = 'Updated ' + new Date().toLocaleTimeString('en-NZ', { timeZone: 'Pacific/Auckland' });
      const out = document.getElementById('out');
      out.innerHTML = '<p class="muted">Loading…</p>';
      const parts = [];
      for (const r of ROUTES) parts.push(await renderRoute(r));
      out.innerHTML = parts.join('');
    }

    run();
  </script>
</body>
</html>
