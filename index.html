<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trains</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; padding: 1em; max-width: 640px; margin: 0 auto; line-height: 1.4; }
    h1 { font-size: 1.3em; margin: 0 0 0.5em; }
    .group { margin-top: 1.5em; padding-top: 0.5em; border-top: 2px solid #333; }
    .group-title { font-weight: bold; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.85em; color: #333; }
    h2 { font-size: 1em; margin: 1em 0 0.3em; border-bottom: 1px solid #ddd; padding-bottom: 0.2em; }
    h2.chain-title { color: #036; border-bottom-color: #036; }
    .train { display: flex; justify-content: space-between; padding: 0.5em 0.4em; border-bottom: 1px solid #eee; align-items: baseline; gap: 0.6em; }
    .train:last-child { border-bottom: none; }
    .train .mins { font-size: 1.3em; font-weight: bold; white-space: nowrap; }
    .train .mins.now, .chain .mins.now { color: #c00; }
    .train .mins.soon, .chain .mins.soon { color: #e80; }
    .train .meta { color: #666; font-size: 0.85em; text-align: right; }
    .train .times { color: #222; font-weight: 500; }
    .chain { display: flex; gap: 0.7em; padding: 0.7em 0.5em; border-bottom: 1px solid #ddf; align-items: flex-start; background: #f4f8ff; }
    .chain:last-child { border-bottom: none; }
    .chain .mins { font-size: 1.3em; font-weight: bold; min-width: 4.5em; }
    .chain-detail { flex: 1; font-size: 0.9em; }
    .chain-detail .main { font-weight: 500; }
    .chain-detail .sub { color: #555; font-size: 0.88em; margin-top: 0.1em; }
    .chain-detail .total { color: #036; font-weight: 600; }
    .wait { font-weight: 600; padding: 0.05em 0.4em; border-radius: 3px; white-space: nowrap; }
    .wait.bad   { color: #fff; background: #c00; }
    .wait.tight { color: #fff; background: #e80; }
    .wait.good  { color: #fff; background: #283; }
    .wait.slow  { color: #333; background: #fd5; }
    .wait.long  { color: #444; background: #ccc; }
    .err { color: #b00; white-space: pre-wrap; font-family: monospace; font-size: 0.8em; background: #fee; padding: 0.5em; border-radius: 4px; }
    button { padding: 0.6em 1.4em; font-size: 1em; }
    .muted { color: #888; font-size: 0.85em; }
    .empty { color: #888; font-style: italic; padding: 0.5em 0.4em; }
  </style>
</head>
<body>
  <h1>Trains</h1>
  <p><button onclick="run()">Refresh</button> <span class="muted" id="time"></span></p>
  <div id="out"><p class="muted">Loading…</p></div>
  <script>
    const BASE = 'https://train-api.aly-chua91.workers.dev/gtfs/v3';

    const WEST = ['new lynn', 'henderson', 'swanson', 'ranui', 'sturges', 'fruitvale', 'glen eden', 'sunnyvale'];
    const CITY = ['brit', 'waitemat'];
    const EAST = ['manukau', 'panmure', 'glen innes', 'meadowbank', 'sylvia', 'otahuhu'];

    const STOPS = {
      newmarket: '115-96c3c7be',
      orakei:    '116-214837ca',
      waitemata: '133-08da14b5',
      avondale:  '105-474861ff',
      remuera:   '114-c06f0e9c'
    };

    const STOP_LABEL = {
      newmarket: 'Newmarket', orakei: 'Orakei', waitemata: 'Waitematā', avondale: 'Avondale', remuera: 'Remuera'
    };

    const LEGS = {
      newmarket_avondale: { title: 'Newmarket → Avondale (direct)',     from: 'newmarket', to: 'avondale',  wantDest: WEST },
      remuera_newmarket:  { title: 'Remuera → Newmarket',               from: 'remuera',   to: 'newmarket', wantDest: CITY },
      orakei_waitemata:   { title: 'Orakei → Waitematā',                from: 'orakei',    to: 'waitemata', wantDest: CITY },
      waitemata_avondale: { title: 'Waitematā → Avondale (leg 2)',      from: 'waitemata', to: 'avondale',  wantDest: WEST },
      avondale_newmarket: { title: 'Avondale → Newmarket',              from: 'avondale',  to: 'newmarket', wantDest: CITY },
      waitemata_orakei:   { title: 'Waitematā → Orakei (leg 2)',        from: 'waitemata', to: 'orakei',    wantDest: EAST }
    };

    const TRANSFER_BUFFER = 3;

    const GROUPS = [
      {
        label: 'To work',
        legs: ['newmarket_avondale', 'remuera_newmarket', 'orakei_waitemata', 'waitemata_avondale'],
        chains: [
          { title: 'Remuera route — matched chain', leg1: 'remuera_newmarket', leg2: 'newmarket_avondale' },
          { title: 'Orakei route — matched chain',  leg1: 'orakei_waitemata',  leg2: 'waitemata_avondale' }
        ]
      },
      {
        label: 'To home',
        legs: ['avondale_newmarket', 'waitemata_orakei'],
        chains: [
          { title: 'Orakei route — matched chain', leg1: 'avondale_newmarket', leg1ArriveStop: 'waitemata', leg2: 'waitemata_orakei' }
        ]
      }
    ];

    async function api(path) {
      try {
        const r = await fetch(BASE + path);
        const text = await r.text();
        let body;
        try { body = JSON.parse(text); } catch { body = text; }
        return { ok: r.ok, status: r.status, body };
      } catch (e) {
        return { ok: false, status: 0, body: 'Network error: ' + e.message };
      }
    }

    function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function nzDateParts() {
      const fmt = new Intl.DateTimeFormat('en-NZ', { timeZone: 'Pacific/Auckland', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
      const parts = {};
      for (const p of fmt.formatToParts(new Date())) if (p.type !== 'literal') parts[p.type] = p.value;
      return parts;
    }

    function parseTime(s) {
      if (!s) return null;
      const m = String(s).match(/^(\d{1,2}):(\d{2}):(\d{2})/);
      if (!m) return null;
      return (+m[1]) * 3600 + (+m[2]) * 60 + (+m[3]);
    }

    function secToHHMM(sec) {
      sec = ((sec % 86400) + 86400) % 86400;
      return `${String(Math.floor(sec / 3600)).padStart(2,'0')}:${String(Math.floor((sec % 3600) / 60)).padStart(2,'0')}`;
    }

    function getDestination(headsign) {
      const h = (headsign || '').toLowerCase();
      const idx = h.indexOf(' to ');
      return idx >= 0 ? h.substring(idx + 4) : h;
    }

    function matchesDirection(headsign, wantPatterns) {
      const dest = getDestination(headsign);
      return wantPatterns.some(p => dest.startsWith(p));
    }

    function cleanHeadsign(headsign) {
      return (headsign || '').replace(/\s\d+\b/g, '').replace(/\bTo\b/g, '→').replace(/\bVia\b/g, 'via').trim();
    }

    function waitClass(mins) {
      if (mins <= 2)  return 'bad';
      if (mins === 3) return 'tight';
      if (mins <= 6)  return 'good';
      if (mins <= 12) return 'slow';
      return 'long';
    }

    function extractTrip(item) {
      const a = item.attributes || item;
      return {
        trip_id: a.trip_id || item.id,
        departure_time: a.departure_time || a.scheduled_departure_time || a.arrival_time,
        arrival_time: a.arrival_time || a.scheduled_arrival_time || a.departure_time,
        trip_headsign: a.trip_headsign || a.headsign || ''
      };
    }

    async function fetchStop(stop_id) {
      const p = nzDateParts();
      const date = `${p.year}-${p.month}-${p.day}`;
      const hour = parseInt(p.hour, 10);
      const qs = `filter[date]=${date}&filter[start_hour]=${hour}&filter[hour_range]=2`;
      const res = await api(`/stops/${encodeURIComponent(stop_id)}/stoptrips?${qs}`);
      if (!res.ok) return { ok: false, status: res.status, body: res.body };
      const trips = (res.body.data || []).map(extractTrip);
      const byTripId = {};
      for (const t of trips) byTripId[t.trip_id] = t;
      return { ok: true, trips, byTripId };
    }

    function buildLegTrips(legId, stopData, nowSec) {
      const leg = LEGS[legId];
      const origin = stopData[leg.from];
      const dest = stopData[leg.to];
      if (!origin?.ok) return { trips: [], error: `${leg.from} fetch failed${origin?.status ? ' (HTTP ' + origin.status + ')' : ''}` };

      let trips = origin.trips
        .filter(t => matchesDirection(t.trip_headsign, leg.wantDest))
        .map(t => {
          const depSec = parseTime(t.departure_time);
          const mins = depSec == null ? null : Math.round((depSec - nowSec) / 60);
          const destTrip = dest?.byTripId?.[t.trip_id];
          const arrSec = destTrip ? parseTime(destTrip.arrival_time) : null;
          const arrMins = arrSec != null ? Math.round((arrSec - nowSec) / 60) : null;
          return { ...t, depSec, arrSec, mins, arrMins };
        })
        .filter(t => t.depSec != null && t.mins >= -1)
        .sort((a, b) => a.depSec - b.depSec);

      return { trips };
    }

    function renderLegSection(leg, legData) {
      const html = [`<h2>${escapeHtml(leg.title)}</h2>`];
      if (legData.error) html.push(`<div class="err">${escapeHtml(legData.error)}</div>`);
      if (legData.trips.length === 0 && !legData.error) {
        html.push(`<div class="empty">No upcoming trains</div>`);
      } else {
        for (const t of legData.trips.slice(0, 3)) {
          const label = t.mins <= 0 ? 'now' : `${t.mins} min`;
          const cls = t.mins <= 1 ? 'now' : (t.mins <= 4 ? 'soon' : '');
          const depTime = (t.departure_time || '').slice(0, 5);
          const arrTime = t.arrSec != null ? secToHHMM(t.arrSec) : '?';
          html.push(`<div class="train"><span class="mins ${cls}">${escapeHtml(label)}</span><span class="meta"><span class="times">${escapeHtml(depTime)} → ${escapeHtml(arrTime)}</span><br>${escapeHtml(cleanHeadsign(t.trip_headsign))}</span></div>`);
        }
      }
      return html.join('');
    }

    function renderChainSection(chainCfg, stopData, legData, nowSec) {
      const leg1 = LEGS[chainCfg.leg1], leg2 = LEGS[chainCfg.leg2];
      const transferStopKey = chainCfg.leg1ArriveStop || leg1.to;
      const transferStop = stopData[transferStopKey];
      const transferLabel = STOP_LABEL[transferStopKey] || transferStopKey;
      const leg1Data = legData[chainCfg.leg1], leg2Data = legData[chainCfg.leg2];

      const pairs = [];
      for (const t1 of leg1Data.trips) {
        const arrTrip = transferStop?.byTripId?.[t1.trip_id];
        const arriveSec = arrTrip ? parseTime(arrTrip.arrival_time) : null;
        if (arriveSec == null) continue;
        const earliestBoardSec = arriveSec + TRANSFER_BUFFER * 60;
        const match = leg2Data.trips.find(t2 => t2.depSec >= earliestBoardSec);
        if (match) {
          pairs.push({
            t1, t2: match,
            transferArriveTime: secToHHMM(arriveSec),
            finalArriveTime: match.arrSec != null ? secToHHMM(match.arrSec) : null,
            finalLabel: STOP_LABEL[leg2.to] || leg2.to,
            waitMins: Math.round((match.depSec - arriveSec) / 60),
            totalMins: match.arrMins != null ? match.arrMins : null
          });
        }
        if (pairs.length >= 3) break;
      }

      const html = [`<h2 class="chain-title">${escapeHtml(chainCfg.title)}</h2>`];
      if (pairs.length === 0) {
        html.push(`<div class="empty">No matched chain in next 2 hours</div>`);
      } else {
        for (const p of pairs) {
          const label = p.t1.mins <= 0 ? 'now' : `${p.t1.mins} min`;
          const cls = p.t1.mins <= 1 ? 'now' : (p.t1.mins <= 4 ? 'soon' : '');
          const wcls = waitClass(p.waitMins);
          const finalStr = p.finalArriveTime ? ` → arrive ${escapeHtml(p.finalLabel)} ${escapeHtml(p.finalArriveTime)}` : '';
          const totalStr = p.totalMins != null ? ` <span class="total">(${p.totalMins} min total)</span>` : '';
          html.push(`<div class="chain">
            <span class="mins ${cls}">${escapeHtml(label)}</span>
            <div class="chain-detail">
              <div class="main">Catch ${escapeHtml(p.t1.departure_time.slice(0,5))} → arrive ${escapeHtml(transferLabel)} ${escapeHtml(p.transferArriveTime)}</div>
              <div class="sub">Board ${escapeHtml(p.t2.departure_time.slice(0,5))} — <span class="wait ${wcls}">${p.waitMins} min transfer</span>${finalStr}${totalStr}</div>
            </div>
          </div>`);
        }
      }
      return html.join('');
    }

    async function run() {
      document.getElementById('time').textContent = 'Updated ' + new Date().toLocaleTimeString('en-NZ', { timeZone: 'Pacific/Auckland' });
      const out = document.getElementById('out');
      out.innerHTML = '<p class="muted">Loading…</p>';

      const p = nzDateParts();
      const nowSec = parseInt(p.hour, 10) * 3600 + parseInt(p.minute, 10) * 60;

      const stopKeys = Object.keys(STOPS);
      const stopResults = await Promise.all(stopKeys.map(k => fetchStop(STOPS[k])));
      const stopData = {};
      stopKeys.forEach((k, i) => { stopData[k] = stopResults[i]; });

      const legData = {};
      for (const id of Object.keys(LEGS)) legData[id] = buildLegTrips(id, stopData, nowSec);

      const parts = [];
      for (const g of GROUPS) {
        parts.push(`<div class="group"><div class="group-title">${escapeHtml(g.label)}</div>`);
        for (const id of g.legs) parts.push(renderLegSection(LEGS[id], legData[id]));
        if (g.chains) for (const c of g.chains) parts.push(renderChainSection(c, stopData, legData, nowSec));
        parts.push('</div>');
      }
      out.innerHTML = parts.join('');
    }

    run();
  </script>
</body>
</html>
